name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    name: API — typecheck + tests (incl. authz release gate)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_ACCESS_SECRET: ci-access-secret-32-bytes-minimum-000
      JWT_REFRESH_SECRET: ci-refresh-secret-32-bytes-minimum-00
      CORS_ORIGINS: http://localhost:8081
      # Testcontainers boots its own throwaway Postgres/Redis (tests/helpers/infra.ts).
      DATABASE_URL: postgresql://placeholder
      REDIS_URL: redis://placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter api db:generate

      - run: pnpm -r typecheck

      - name: API tests (Testcontainers — order concurrency + authz)
        run: pnpm --filter api test
