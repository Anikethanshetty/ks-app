packages:
  - "apps/*"
  - "packages/*"
# React Native / Metro cannot resolve pnpm's isolated symlinked node_modules
# (transitive deps like @expo/metro-runtime, react-native-css-interop). Hoist flat.
nodeLinker: hoisted
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  core-js: true
  cpu-features: true
  esbuild: true
  prisma: true
  protobufjs: true
  ssh2: true
  unrs-resolver: true
